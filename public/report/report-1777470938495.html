    <meta name="description" content="Avis Budget Group (CAR)는 2026년 1분기 예상치보다 높은 25.3억 달러의 매출을 기록했음에도 불구하고, 예상치를 하회하는 주당 8.01달러의 손실을 발표했습니다. 이 소식으로 인해 주가는 4월 29일 하루 동안 약 17% 하락하는 등 큰 폭의 변동성을 보였습니다. 최근 몇 주간 주가는 숏 스퀴즈로 인해 52주 최고가인 847.70달러까지 급등했다가 4월 28일 182.01달러로 급락하는 등 극심한 변동성을 겪었습니다." />
