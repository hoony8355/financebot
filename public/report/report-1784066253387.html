    <meta name="description" content="NextCure, Inc. (NXTC)는 암 및 면역 관련 질환 치료를 위한 면역의약품 개발에 주력하는 임상 단계 바이오제약 회사입니다. 2026년 7월 14일, NextCure는 염증성 질환 치료를 위한 경구용 IL-23 치료 프로그램(AVR-001)을 개발하는 비상장 바이오기술 회사인 Avere Therapeutics, Inc.와의 최종 합병 계약을 발표했습니다. 이 합병은 Avere의 프로그램을 발전시키기 위한 것이며, 동시에 약 3억 2천만 달러의 사모를 통해 AVR-001의 개발에 자금을 조달할 계획입니다. 합병 후 기존 NextCure 주주들은 합병 회사의 약 1.21%를 소유하게 될 것으로 예상됩니다. 이 소식으로 인해 NextCure의 주가는 200% 이상 급등하며 상당한 변동성을 보였습니다." />
