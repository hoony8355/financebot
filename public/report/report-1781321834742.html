    <meta name="description" content="Wonik IPS Co., Ltd. (240810)는 1991년 설립된 대한민국의 산업 기계 기업으로, 반도체, 디스플레이, 태양전지 산업을 위한 첨단 장비를 연구, 개발, 제조 및 판매합니다. 주요 반도체 장비로는 다중 패터닝, 3D 낸드(NAND) 제작, 유전체 박막 증착을 위한 ALD, CVD, PECVD 시스템이 있으며, 특히 1998년 세계 최초로 ALD 시스템을 양산했습니다. 또한 QD-OLED, AMOLED, 대형 LCD 패널 시장을 위한 디스플레이 시스템도 제공하며, 애프터서비스 및 일반 기계 제조도 영위하고 있습니다. 현재 약 1,470명의 직원을 보유하고 있습니다." />
