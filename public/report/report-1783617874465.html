    <meta name="description" content="Wrap Technologies, Inc. (WRAP)는 전 세계 법 집행 및 보안 담당자를 위한 비살상 치안 솔루션을 개발하는 공공 안전 기술 및 서비스 기업입니다. 주요 제품으로는 비살상 구속 장치인 BolaWrap Remote Restraint Device, VR 훈련 시스템인 Wrap Reality, 신체 착용 카메라 WrapVision, 그리고 무인 항공기 시스템(C-UAS) 대응 솔루션이 있습니다. 최근 BolaWrap 150이 총기가 아닌 구속 장치로 분류되었다는 미 연방 주류·담배·총기류 단속국(ATF)의 역사적인 판결과 자율 방어 및 공공 안전 플랫폼인 WrapShield의 출시로 긍정적인 모멘텀을 얻고 있습니다. 주가는 지난 한 주와 한 달 동안 상당한 상승세를 보였으나, 당일에는 소폭 하락했습니다." />
