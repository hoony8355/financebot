    <meta name="description" content="Arcellx (ACLX)는 길리어드 사이언스(Gilead Sciences)에 인수된다는 소식에 주가가 급등한 임상 단계 바이오 기술 기업입니다. 길리어드는 주당 115달러 현금과 향후 anito-cel 판매 마일스톤에 연동된 주당 5달러의 조건부 가치권(CVR)을 포함해 약 78억 달러에 Arcellx를 인수하기로 합의했습니다. 주요 파이프라인인 다발성 골수종 CAR-T 치료제 anito-cel은 현재 미국 FDA의 심사 중이며 2026년 12월 23일 결정이 예정되어 있습니다." />
