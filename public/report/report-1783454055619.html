    <meta name="description" content="Lianhe Sowell International Group Ltd (NASDAQ: LHSW)는 중국에 기반을 둔 기술 회사로, 산업용 비전, AI 기반 검사 및 로봇 공학 솔루션을 제공합니다. 주요 제품으로는 AI 기반 3D 자동 광학 검사(AOI) 시스템과 9축 연동 스프레이 도장 로봇이 있으며, 스마트 교통, 산업 자동화, 인공지능 및 머신 비전 분야에 중점을 둡니다. 최근 아프리카 및 동남아시아 지역에서 AI 기반 자동차 도장 로봇 공급 계약을 체결했습니다. 회사는 최근 1대 16 주식 병합을 단행하여 나스닥 상장 요건을 유지했습니다. 현재 주가는 분석가들의 목표가와 현저한 괴리를 보이며, 낮은 유동성(low-float)으로 인해 극심한 단기 변동성을 겪고 있습니다." />
