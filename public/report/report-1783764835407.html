    <meta name="description" content="아메리칸 항공 그룹(AAL)은 미국 텍사스주 포트워스에 본사를 둔 상장 항공 지주 회사입니다. 2013년 AMR 코퍼레이션과 US 에어웨이즈 그룹의 합병으로 설립되었으며, 운송 승객 수 및 정기 여객-킬로미터 비행 기준 세계 최대 항공사입니다. 전 세계 50개국 350개 목적지에 정기 항공 운송 서비스를 제공하며, 나스닥 글로벌 셀렉트 마켓에 상장되어 S&P MidCap 400 지수에 포함되어 있습니다." />
